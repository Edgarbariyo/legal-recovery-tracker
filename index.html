<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Legal Recovery Tracker — Stanbic Recoveries</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --navy-deep: #0c2340;
  --navy-mid: #163b63;
  --navy-pale: #eef2f7;
  --gold: #c9962e;
  --gold-pale: #f3e3c0;
  --ink: #1a1f29;
  --muted: #5b6472;
  --line: #d9dee6;
  --bg: #f6f7f9;
  --white: #ffffff;
  --red: #a23b34;
  --green: #3e7d59;
  --amber: #b8862e;

  --serif: "Source Serif 4", "Georgia", serif;
  --sans: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: "IBM Plex Mono", "Courier New", monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
}

button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; font-size: 14px; }

a { color: var(--navy-mid); }

/* ---------- Layout shell ---------- */
#app { min-height: 100vh; display: flex; flex-direction: column; }

.topbar {
  background: var(--navy-deep);
  color: var(--white);
  padding: 0 28px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 3px solid var(--gold);
}

.topbar .brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.topbar .brand .mark {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 19px;
  letter-spacing: 0.2px;
}

.topbar .brand .sub {
  font-size: 12px;
  color: var(--gold-pale);
  letter-spacing: 0.6px;
  text-transform: uppercase;
  border-left: 1px solid rgba(255,255,255,0.25);
  padding-left: 10px;
}

.topbar .who {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 13px;
  color: var(--gold-pale);
}

.topbar .who button {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  color: var(--white);
  padding: 6px 12px;
  border-radius: 4px;
  font-size: 12px;
}
.topbar .who button:hover { background: rgba(255,255,255,0.08); }

main { flex: 1; padding: 24px 28px 60px; max-width: 1280px; margin: 0 auto; width: 100%; }

/* ---------- Login screen ---------- */
.login-screen {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--navy-deep);
  background-image: linear-gradient(165deg, var(--navy-deep) 0%, #081729 100%);
}

.login-card {
  background: var(--white);
  width: 380px;
  padding: 36px 32px 30px;
  border-radius: 6px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  position: relative;
}

.login-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--gold);
  border-radius: 6px 6px 0 0;
}

.login-card .docket-no {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-bottom: 18px;
}

.login-card h1 {
  font-family: var(--serif);
  font-size: 22px;
  margin: 0 0 4px;
  color: var(--navy-deep);
}
.login-card p.tag { color: var(--muted); margin: 0 0 26px; font-size: 13px; }

.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--navy-mid);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.field input, .field select, .field textarea {
  width: 100%;
  padding: 9px 11px;
  border: 1px solid var(--line);
  border-radius: 4px;
  background: var(--white);
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: 2px solid var(--gold);
  outline-offset: 0;
  border-color: var(--gold);
}
.field textarea { resize: vertical; min-height: 70px; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 9px 16px;
  border-radius: 4px;
  border: 1px solid transparent;
  font-weight: 600;
  font-size: 13px;
}
.btn-primary { background: var(--navy-deep); color: var(--white); }
.btn-primary:hover { background: var(--navy-mid); }
.btn-gold { background: var(--gold); color: var(--navy-deep); }
.btn-gold:hover { background: #d9a93f; }
.btn-ghost { background: transparent; border-color: var(--line); color: var(--ink); }
.btn-ghost:hover { background: var(--navy-pale); }
.btn-block { width: 100%; }
.btn-danger { background: transparent; border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: #fbeceb; }

.error-msg {
  background: #fbeceb;
  color: var(--red);
  border: 1px solid #e6c5c2;
  padding: 8px 10px;
  border-radius: 4px;
  font-size: 12.5px;
  margin-bottom: 14px;
}

/* ---------- Page header ---------- */
.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.page-head h2 {
  font-family: var(--serif);
  font-size: 24px;
  margin: 0;
  color: var(--navy-deep);
}
.page-head .eyebrow {
  font-size: 11px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 700;
  margin-bottom: 4px;
}

/* ---------- Stat cards ---------- */
.stat-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
}
.stat-card .n {
  font-family: var(--serif);
  font-size: 26px;
  color: var(--navy-deep);
  line-height: 1;
}
.stat-card .l {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  margin-top: 6px;
}
.stat-card.accent { border-top: 3px solid var(--gold); }
.stat-card.total { border-top: 3px solid var(--navy-deep); }

/* ---------- Toolbar ---------- */
.toolbar {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.toolbar input[type="search"], .toolbar select {
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: 4px;
  background: var(--white);
}
.toolbar input[type="search"] { min-width: 220px; }
.toolbar .spacer { flex: 1; }

/* ---------- Table ---------- */
.table-wrap {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 6px;
  overflow-x: auto;
  overflow-y: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--muted);
  background: var(--navy-pale);
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  white-space: nowrap;
}
tbody td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #fafbfc; cursor: pointer; }

.acct {
  font-family: var(--mono);
  font-size: 12.5px;
  color: var(--navy-mid);
}
.empty-row td {
  text-align: center;
  padding: 40px 10px;
  color: var(--muted);
}

/* ---------- Stage badges ---------- */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 100px;
  font-size: 11.5px;
  font-weight: 600;
  white-space: nowrap;
}
.badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; }

.stage-Pre-Trial { background: #eef2f7; color: var(--navy-mid); }
.stage-Pre-Trial::before { background: var(--navy-mid); }
.stage-Trial { background: #f3e9d6; color: var(--amber); }
.stage-Trial::before { background: var(--amber); }
.stage-Post-Trial { background: #fdeedb; color: #b15c1f; }
.stage-Post-Trial::before { background: #b15c1f; }
.stage-Judged { background: #e6e9f5; color: #3f4a8f; }
.stage-Judged::before { background: #3f4a8f; }
.stage-Execution { background: #f3e3c0; color: var(--gold); }
.stage-Execution::before { background: var(--gold); }
.stage-Archived { background: #e3efe7; color: var(--green); }
.stage-Archived::before { background: var(--green); }

.status-pill {
  font-size: 11px;
  color: var(--muted);
}
.status-On-Hold { color: var(--amber); }
.status-Closed { color: var(--green); }
.status-Written-Off { color: var(--red); }

.badge-activity {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 600;
}
.badge-activity-new { background: var(--navy-pale); color: var(--muted); }
.badge-activity-revisited { background: #f3e3c0; color: var(--gold); }
.activity-date { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
.who-line { font-size: 12px; color: var(--ink); }
.who-line.who-updated { color: var(--muted); font-size: 11px; margin-top: 2px; }

.row-actions { display: flex; gap: 6px; }
.icon-btn {
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: 5px 6px;
  cursor: pointer;
  color: var(--navy-mid);
  display: inline-flex;
  align-items: center;
}
.icon-btn:hover { background: var(--navy-pale); }
.icon-btn.danger { color: var(--red); }
.icon-btn.danger:hover { background: #fdecea; }

/* ---------- Modal / drawer ---------- */
.overlay {
  position: fixed; inset: 0;
  background: rgba(10,20,35,0.5);
  display: flex;
  align-items: stretch;
  justify-content: flex-end;
  z-index: 50;
}
.overlay.center { align-items: center; justify-content: center; }

.drawer {
  background: var(--bg);
  width: 560px;
  max-width: 92vw;
  height: 100%;
  overflow-y: auto;
  box-shadow: -10px 0 40px rgba(0,0,0,0.25);
}
.drawer.drawer-wide { width: 820px; }

.modal-box {
  background: var(--white);
  width: 480px;
  max-width: 92vw;
  border-radius: 6px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  max-height: 88vh;
  overflow-y: auto;
}

.drawer-head, .modal-head {
  position: sticky;
  top: 0;
  background: var(--navy-deep);
  color: var(--white);
  padding: 18px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 3px solid var(--gold);
  z-index: 2;
}
.drawer-head h3, .modal-head h3 {
  font-family: var(--serif);
  font-size: 17px;
  margin: 0;
}
.drawer-head .acct-line, .modal-head .acct-line {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--gold-pale);
  margin-top: 3px;
}
.close-x {
  background: transparent;
  border: none;
  color: var(--white);
  font-size: 20px;
  line-height: 1;
  padding: 2px 6px;
}
.close-x:hover { color: var(--gold); }

.drawer-body, .modal-body { padding: 20px 22px; }

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 16px;
}
.form-grid .full { grid-column: 1 / -1; }

.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--gold);
  font-weight: 700;
  margin: 22px 0 10px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
}
.section-label:first-child { margin-top: 0; padding-top: 0; border-top: none; }

.case-summary {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 16px 18px;
  margin-bottom: 20px;
}
.case-summary .row {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  font-size: 13px;
  border-bottom: 1px dashed var(--line);
}
.case-summary .row:last-child { border-bottom: none; }
.case-summary .row .k { color: var(--muted); }
.case-summary .row .v { font-weight: 600; text-align: right; }

/* ---------- Timeline ---------- */
.timeline { position: relative; padding-left: 26px; }
.timeline::before {
  content: "";
  position: absolute;
  left: 7px; top: 6px; bottom: 6px;
  width: 2px;
  background: var(--line);
}
.tl-item { position: relative; padding-bottom: 22px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-dot {
  position: absolute;
  left: -26px; top: 2px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--white);
  border: 3px solid var(--navy-mid);
}
.tl-item.is-latest .tl-dot { border-color: var(--gold); background: var(--gold); }
.tl-head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
.tl-stage { font-weight: 700; color: var(--navy-deep); font-size: 13.5px; }
.tl-date { font-size: 12px; color: var(--muted); font-family: var(--mono); }
.tl-outcome { font-size: 13px; margin-top: 4px; }
.tl-next {
  margin-top: 6px;
  font-size: 12px;
  color: var(--amber);
  background: #fdf6e8;
  display: inline-block;
  padding: 3px 8px;
  border-radius: 4px;
}
.tl-remarks { font-size: 12.5px; color: var(--muted); margin-top: 4px; font-style: italic; }
.tl-by { font-size: 11px; color: var(--muted); margin-top: 4px; }

.actions-row { display: flex; gap: 10px; margin-top: 20px; }

footer.foot {
  text-align: center;
  font-size: 11.5px;
  color: var(--muted);
  padding: 18px 0 26px;
}

@media (max-width: 760px) {
  .stat-row { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
  main { padding: 16px; }
  .topbar { padding: 0 14px; }
}

</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
// SUPABASE CONFIG
// ------------------------------------------------------------
// This is the SAME Supabase project used by the PPB Settlements
// Filing app. The two apps are kept separate by Postgres schema:
//   - PPB Settlements lives in the "public" schema (app_users, ppb_settlements)
//   - Legal Tracker lives in its own "legal" schema (see schema.sql)
// Nothing here touches PPB's tables or its login.
// ============================================================

const SUPABASE_URL = 'https://obcyqmyyspbxykmgwigx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iY3lxbXl5c3BieHlrbWd3aWd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTIyNDEsImV4cCI6MjA5MzEyODI0MX0.vNa4rNlrSaSAjaAspJLlRv05Qx09EqhdduQDG8b5GQo';


// ============================================================
// LEGAL RECOVERY TRACKER — app.js
// ============================================================

// This Supabase project is shared with the PPB Settlements app.
// db.schema scopes every sb.from(...) call below to the "legal"
// schema, so it never touches PPB's "public" tables (app_users,
// ppb_settlements). Login here uses our own legal.app_users table
// with a hashed password check (same pattern as PPB) — not
// Supabase Auth — so there's no email confirmation step and no
// self-signup. Accounts are created by the admin directly in SQL.
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  db: { schema: 'legal' },
});

const STAGES = ["Pre-Trial", "Trial", "Post-Trial", "Judged", "Execution", "Archived"];
const LAW_FIRMS = [
  "Cristal Advocates",
  "ARCADIA  ADVOCATES",
  "S and L Advocates",
  "Kalikumutima and Co Advocates",
  "Ligomarc Advocates",
  "Nambogo and Co. Advocates",
  "Nangwala Rezida and Co Advocates",
  "ORIMA AND CO. ADVOCATES",
  "H and G Advocates",
  "MMAKS ADVOCATES",
  "AF MPANGA ADVOCATES",
  "Kyagaba and Otatiina (Dentons)",
  "K and K Advocates",
  "KNT Advocates",
];
const MATTER_TYPES = ["CIVIL", "CRIMINAL", "COMMERCIAL"];
const COST_CENTERS = ["BUSINESS BANKING", "PERSONAL & BUSINESS BANKING", "CORPORATE & INVESTMENT BANKING"];
const FORUMS = ["Chief Magistrate", "High Court", "Court of Appeal", "Supreme Court", "Tribunal"];
const CASE_CATEGORIES = ["BANK IS SUING", "BANK IS BEING SUED"];
const CASE_CURRENT_STATES = ["CASE STILL OPEN", "CASE CLOSED"];

let state = {
  user: null,
  cases: [],
  filters: { search: "", stage: "", state: "CASE STILL OPEN" },
};

const root = document.getElementById("app");

// ---------- helpers ----------
const cls = (s) => s.replace(/\s+/g, "-");
const money = (n) => n == null ? "—" : "UGX " + Number(n).toLocaleString();
const fdate = (d) => d ? new Date(d).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }) : "—";
const fdatetime = (d) => d ? new Date(d).toLocaleString("en-GB", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" }) : "—";
const esc = (s) => (s ?? "").toString().replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const canEdit = () => state.user.role === "manager" || state.user.role === "admin";

// ---------- field metadata (used for edit-history display + CSV export) ----------
const FIELD_META = {
  citation:             { label: "Citation",              type: "text"  },
  Customer_Name:     { label: "Customer Name",      type: "text"  },
  quantum:              { label: "Quantum",                type: "money" },
  legal_provision:      { label: "Loan Account",        type: "text" },
  estimated_legal_fees: { label: "Estimated legal fees",   type: "money" },
  damages:              { label: "Damages",                type: "money" },
  filing_date:          { label: "Filing date",            type: "date"  },
  law_firm:             { label: "Law firm",               type: "text"  },
  cause_of_action:      { label: "Cause of action",        type: "text"  },
  case_stage:           { label: "Case stage",             type: "text"  },
  matter_type:          { label: "Matter type",            type: "text"  },
  cost_center:          { label: "Cost center",            type: "text"  },
  forum:                { label: "Forum",                  type: "text"  },
  in_charge_counsel:    { label: "In-charge counsel",       type: "text"  },
  case_category:        { label: "Case category",          type: "text"  },
  case_current_state:   { label: "Case current state",      type: "text"  },
  when_created:         { label: "When created",           type: "date"  },
  comments:             { label: "Comments",                type: "text"  },
};

function formatFieldValue(type, value) {
  if (value == null || value === "") return "—";
  if (type === "money") return money(value);
  if (type === "date") return fdate(value);
  return esc(value);
}

function activityBadge(c) {
  const count = c.engagement_count || 0;
  const revisited = count >= 2;
  const label = revisited ? `${count} updates` : (count === 1 ? "Just opened" : "No activity");
  const badgeClass = revisited ? "badge-activity-revisited" : "badge-activity-new";
  const dateLine = c.last_engaged_at ? `<div class="activity-date">${fdate(c.last_engaged_at)}</div>` : "";
  return `<span class="badge-activity ${badgeClass}">${esc(label)}</span>${dateLine}`;
}

function whoBadge(c) {
  const entered = c.created_by_name || "—";
  const updated = c.last_updated_by_name || c.created_by_name || "—";
  const updatedDate = c.updated_at ? fdate(c.updated_at) : null;
  if (updated === entered) {
    return `<div class="who-line">Entered: ${esc(entered)}</div>`;
  }
  return `
    <div class="who-line">Entered: ${esc(entered)}</div>
    <div class="who-line who-updated">Updated: ${esc(updated)}${updatedDate ? " · " + updatedDate : ""}</div>
  `;
}

const EDIT_ICON_SVG = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4Z"/></svg>`;
const DELETE_ICON_SVG = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>`;

async function deleteCase(caseId, citation) {
  if (!confirm(`Delete this case?\n\n${citation}\n\nThis will also remove its timeline and edit history. This cannot be undone.`)) return false;
  const { error } = await sb.from("legal_cases").delete().eq("id", caseId);
  if (error) { toast("Could not delete case: " + error.message, true); return false; }
  toast("Case deleted.");
  await loadCases();
  renderDashboard();
  return true;
}

function buildChangeDiff(before, after) {
  const changes = {};
  Object.keys(FIELD_META).forEach((key) => {
    const ov = before[key] ?? null;
    const nv = after[key] ?? null;
    if (String(ov) !== String(nv)) changes[key] = { old: ov, new: nv };
  });
  return changes;
}

  { key: "last_updated_by_name", header: "Last Updated By" },
  { key: "updated_at",           header: "Updated On" },
];

function csvEscape(val) {
  if (val == null) return "";
  const s = String(val);
  if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

// ---------- combined export: each engagement as its own row, with the
// case's other details repeated on every row, distinguished by Engagement # ----------
const ENGAGEMENT_COLUMNS = ["Engagement #", "Engagement Date", "Outcome", "Next Action", "Next Action Date", "Remarks"];

async function exportCasesToCSV(rows) {
  if (!rows || rows.length === 0) { toast("No cases to export with the current filters.", true); return; }

  const caseIds = rows.map(r => r.id);
  const { data: allHistory, error } = await sb
    .from("case_stage_history")
    .select("*")
    .in("case_id", caseIds)
    .order("case_id", { ascending: true })
    .order("date_entered", { ascending: true })
    .order("created_at", { ascending: true });
  if (error) { toast("Could not load engagement history: " + error.message, true); return; }

  const historyByCase = {};
  (allHistory || []).forEach(h => {
    historyByCase[h.case_id] = historyByCase[h.case_id] || [];
    historyByCase[h.case_id].push(h);
  });

  const header = [...EXPORT_COLUMNS.map(c => c.header), ...ENGAGEMENT_COLUMNS].map(csvEscape).join(",");

  const lines = [];
  rows.forEach(c => {
    const entries = historyByCase[c.id] || [];
    if (entries.length === 0) {
      const caseCells = EXPORT_COLUMNS.map(col => csvEscape(c[col.key]));
      lines.push([...caseCells, "", "", "", "", "", ""].join(","));
      return;
    }
    entries.forEach((h, i) => {
      // For each engagement row, Case Stage / Last Updated By / Updated On
      // reflect THAT engagement (not the case's current overall values),
      // so each row is internally consistent for that point in time.
      const rowCaseValues = { ...c, case_stage: h.stage, last_updated_by_name: h.logged_by_name, updated_at: h.date_entered };
      const caseCells = EXPORT_COLUMNS.map(col => csvEscape(rowCaseValues[col.key]));
      lines.push([
        ...caseCells,
        csvEscape(i + 1),
        csvEscape(h.date_entered),
        csvEscape(h.outcome),
        csvEscape(h.next_action),
        csvEscape(h.next_action_date),
        csvEscape(h.remarks),
      ].join(","));
    });
  });

  const csv = [header, ...lines].join("\r\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `legal_cases_export_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  toast(`Exported ${rows.length} case(s) (${lines.length} rows total) to CSV.`);
}

function toast(msg, isError) {
  const t = document.createElement("div");
  t.textContent = msg;
  t.style.position = "fixed";
  t.style.bottom = "24px";
  t.style.left = "50%";
  t.style.transform = "translateX(-50%)";
  t.style.background = isError ? "#a23b34" : "#0c2340";
  t.style.color = "#fff";
  t.style.padding = "10px 18px";
  t.style.borderRadius = "5px";
  t.style.fontSize = "13px";
  t.style.zIndex = "999";
  t.style.boxShadow = "0 8px 24px rgba(0,0,0,0.25)";
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

async function sha256Hex(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
}

  const f = state.filters;
  return state.cases.filter((c) => {
    if (f.stage && c.case_stage !== f.stage) return false;
    if (f.state && c.case_current_state !== f.state) return false;
    if (f.search) {

      const hay = `${c.citation} ${c.law_firm || ""} ${c.cause_of_action || ""} ${c.in_charge_counsel || ""} ${c.assigned_counsel || ""}`.toLowerCase();

    return true;
  });
}

          <div class="row"><span class="k">Estimated legal fees</span><span class="v">${money(c.estimated_legal_fees)}</span></div>
          <div class="row"><span class="k">Damages</span><span class="v">${money(c.damages)}</span></div>
          <div class="row"><span class="k">Filing date</span><span class="v">${fdate(c.filing_date)}</span></div>
          <div class="row"><span class="k">Law firm</span><span class="v">${esc(c.law_firm || "—")}</span></div>
          <div class="row"><span class="k">Forum</span><span class="v">${esc(c.forum || "—")}</span></div>
          <div class="row"><span class="k">In-charge counsel</span><span class="v">${esc(c.in_charge_counsel || "—")}</span></div>
          <div class="row"><span class="k">Cost center</span><span class="v">${esc(c.cost_center || "—")}</span></div>
          <div class="row"><span class="k">When created</span><span class="v">${fdate(c.when_created)}</span></div>
          ${c.comments ? `<div class="row"><span class="k">Comments</span><span class="v">${esc(c.comments)}</span></div>` : ""}
        </div>

        ${canEdit() ? `
        <div class="actions-row">
          <button class="btn btn-gold" id="logStepBtn">Log next step</button>
          <button class="btn btn-ghost" id="editCaseBtn">Edit case details</button>
          <button class="btn btn-ghost" id="deleteCaseBtn" style="color:var(--red);border-color:var(--red);">Delete case</button>
        </div>
        ` : ""}

        <div class="section-label">Case timeline</div>
        <div class="timeline" id="timelineWrap">
          ${history.length === 0 ? `<p style="color:var(--muted); font-size:13px;">No steps logged yet.</p>` :
            history.map((h, i) => `
              <div class="tl-item ${i === history.length - 1 ? "is-latest" : ""}">
                <div class="tl-dot"></div>
                <div class="tl-head">
                  <span class="tl-stage">${esc(h.stage)}</span>
                  <span class="tl-date">${fdate(h.date_entered)}</span>
                </div>
                ${h.outcome ? `<div class="tl-outcome">${esc(h.outcome)}</div>` : ""}
                ${h.next_action ? `<div class="tl-next">Next: ${esc(h.next_action)}${h.next_action_date ? " — " + fdate(h.next_action_date) : ""}</div>` : ""}
                ${h.remarks ? `<div class="tl-remarks">${esc(h.remarks)}</div>` : ""}
                ${h.logged_by_name ? `<div class="tl-remarks" style="opacity:0.7;">Logged by ${esc(h.logged_by_name)}</div>` : ""}
              </div>
            `).join("")
          }
        </div>

        <div class="section-label">Edit history</div>
        <div class="timeline" id="auditWrap">
          ${auditLog.length === 0 ? `<p style="color:var(--muted); font-size:13px;">No edits logged yet.</p>` :
            auditLog.map((a) => {
              const changeRows = Object.entries(a.changes || {}).map(([key, ch]) => {
                const meta = FIELD_META[key] || { label: key, type: "text" };
                return `<div class="tl-remarks"><strong>${esc(meta.label)}:</strong> ${formatFieldValue(meta.type, ch.old)} → ${formatFieldValue(meta.type, ch.new)}</div>`;
              }).join("");
              return `
                <div class="tl-item">
                  <div class="tl-dot"></div>
                  <div class="tl-head">
                    <span class="tl-stage">${esc(a.changed_by_name || "Unknown")}</span>
                    <span class="tl-date">${fdatetime(a.changed_at)}</span>
                  </div>
                  ${changeRows}
                </div>
              `;
            }).join("")
          }
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector(".close-x").onclick = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  if (canEdit()) {
    overlay.querySelector("#logStepBtn").onclick = () => openLogStepModal(c, overlay);
    overlay.querySelector("#editCaseBtn").onclick = () => openEditCaseModal(c, overlay);
    overlay.querySelector("#deleteCaseBtn").onclick = async () => {
      const ok = await deleteCase(c.id, c.citation);
      if (ok) overlay.remove();
    };
  }
}

// ---------- log step modal ----------
function openLogStepModal(c, parentOverlay) {
  const overlay = document.createElement("div");
  overlay.className = "overlay center";
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-head">
        <div><h3>Log next step</h3><div class="acct-line">${esc(c.citation)}</div></div>
        <button class="close-x">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Stage *</label>
          <select id="s_stage">
            ${STAGES.map(s => `<option value="${s}" ${s === c.case_stage ? "selected" : ""}>${esc(s)}</option>`).join("")}
          </select>
        </div>
        <div class="field"><label>Date *</label><input type="date" id="s_date" value="${new Date().toISOString().slice(0,10)}" /></div>
        <div class="field"><label>Outcome</label><input id="s_outcome" placeholder="e.g. Adjourned to next mention" /></div>
        <div class="field"><label>Next action</label><input id="s_nextaction" placeholder="e.g. Attend hearing" /></div>
        <div class="field"><label>Next action date</label><input type="date" id="s_nextdate" /></div>
        <div class="field"><label>Remarks</label><textarea id="s_remarks"></textarea></div>
        <div class="actions-row">
          <button class="btn btn-primary" id="saveStep">Save step</button>
          <button class="btn btn-ghost" id="cancelStep">Cancel</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector(".close-x").onclick = () => overlay.remove();
  overlay.querySelector("#cancelStep").onclick = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  overlay.querySelector("#saveStep").onclick = async () => {
    const payload = {
      case_id: c.id,
      stage: document.getElementById("s_stage").value,
      date_entered: document.getElementById("s_date").value,
      outcome: document.getElementById("s_outcome").value.trim() || null,
      next_action: document.getElementById("s_nextaction").value.trim() || null,
      next_action_date: document.getElementById("s_nextdate").value || null,
      remarks: document.getElementById("s_remarks").value.trim() || null,
      logged_by: state.user.id,
      logged_by_name: state.user.full_name,
    };
    const { error } = await sb.from("case_stage_history").insert(payload);
    if (error) { toast("Could not log step: " + error.message, true); return; }

    const caseUpdate = { last_updated_by_name: state.user.full_name };
    if (payload.stage === "Archived") caseUpdate.case_current_state = "CASE CLOSED";
    await sb.from("legal_cases").update(caseUpdate).eq("id", c.id);

    overlay.remove();
    if (parentOverlay) parentOverlay.remove();
    toast("Step logged.");
    await loadCases();
    renderDashboard();
  };
}

// ---------- edit case modal ----------
function openEditCaseModal(c, parentOverlay) {
  const overlay = document.createElement("div");
  overlay.className = "overlay center";
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-head">
        <div><h3>Edit case details</h3><div class="acct-line">${esc(c.citation)}</div></div>
        <button class="close-x">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="field full"><label>Citation</label><input id="e_citation" value="${esc(c.citation)}" /></div>
          <div class="field"><label>Cause of action</label><input id="e_cause" value="${esc(c.cause_of_action || "")}" /></div>
          <div class="field"><label>Filing date</label><input type="date" id="e_filingdate" value="${c.filing_date || ""}" /></div>
          <div class="field"><label>Customer_Name</label><input type="text"  id="e_customer _name" value="${c.Customer_Name ?? ""}" /></div>
          <div class="field"><label>Quantum (UGX)</label><input type="number" id="e_quantum" value="${c.quantum ?? ""}" /></div>         
          <div class="field"><label>Estimated legal fees (UGX)</label><input type="number" id="e_fees" value="${c.estimated_legal_fees ?? ""}" /></div>
          <div class="field"><label>Damages (UGX)</label><input type="number" id="e_damages" value="${c.damages ?? ""}" /></div>
          <div class="field"><label>Case stage</label>
            <select id="e_stage">${STAGES.map(s => `<option value="${s}" ${s === c.case_stage ? "selected" : ""}>${esc(s)}</option>`).join("")}</select>
          </div>
          <div class="field"><label>Case current state</label><input id="e_currentstate" list="e_currentStateList" value="${esc(c.case_current_state || "")}" /></div>
          <div class="field"><label>Case category</label><input id="e_category" list="e_categoryList" value="${esc(c.case_category || "")}" /></div>
          <div class="field"><label>Matter type</label><input id="e_mattertype" list="e_matterTypeList" value="${esc(c.matter_type || "")}" /></div>
          <div class="field"><label>Law firm</label>
            <select id="e_lawfirm"><option value="">— Select —</option>${LAW_FIRMS.map(s => `<option value="${esc(s)}" ${s === c.law_firm ? "selected" : ""}>${esc(s)}</option>`).join("")}</select>
          </div>
          <div class="field"><label>Forum</label><input id="e_forum" list="e_forumList" value="${esc(c.forum || "")}" /></div>
          <div class="field"><label>In-charge counsel</label><input id="e_incharge" value="${esc(c.in_charge_counsel || "")}" /></div>
          <div class="field"><label>Cost center</label><input id="e_costcenter" list="e_costCenterList" value="${esc(c.cost_center || "")}" /></div>
          <div class="field"><label>When created</label><input type="date" id="e_whencreated" value="${c.when_created || ""}" /></div>
          <div class="field full"><label>Comments</label><textarea id="e_comments">${esc(c.comments || "")}</textarea></div>
        </div>
        <datalist id="e_currentStateList">${CASE_CURRENT_STATES.map(s => `<option value="${s}">`).join("")}</datalist>
        <datalist id="e_categoryList">${CASE_CATEGORIES.map(s => `<option value="${s}">`).join("")}</datalist>
        <datalist id="e_matterTypeList">${MATTER_TYPES.map(s => `<option value="${s}">`).join("")}</datalist>
        <datalist id="e_forumList">${FORUMS.map(s => `<option value="${s}">`).join("")}</datalist>
        <datalist id="e_costCenterList">${COST_CENTERS.map(s => `<option value="${s}">`).join("")}</datalist>
        <div class="actions-row">
          <button class="btn btn-primary" id="saveEdit">Save changes</button>
          <button class="btn btn-ghost" id="cancelEdit">Cancel</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector(".close-x").onclick = () => overlay.remove();
  overlay.querySelector("#cancelEdit").onclick = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  overlay.querySelector("#saveEdit").onclick = async () => {
    const payload = {
      citation: document.getElementById("e_citation").value.trim(),
      cause_of_action: document.getElementById("e_cause").value.trim() || null,
      filing_date: document.getElementById("e_filingdate").value || null,
      evaluation_score: parseFloat(document.getElementById("e_evalscore").value) || null,
      quantum: parseFloat(document.getElementById("e_quantum").value) || null,
      legal_provision: parseFloat(document.getElementById("e_provision").value) || null,
      estimated_legal_fees: parseFloat(document.getElementById("e_fees").value) || null,
      damages: parseFloat(document.getElementById("e_damages").value) || null,
      case_stage: document.getElementById("e_stage").value,
      case_current_state: document.getElementById("e_currentstate").value.trim() || null,
      case_category: document.getElementById("e_category").value.trim() || null,
      matter_type: document.getElementById("e_mattertype").value.trim() || null,
      law_firm: document.getElementById("e_lawfirm").value.trim() || null,
      forum: document.getElementById("e_forum").value.trim() || null,
      in_charge_counsel: document.getElementById("e_incharge").value.trim() || null,
      assigned_counsel: document.getElementById("e_assigned").value.trim() || null,
      cost_center: document.getElementById("e_costcenter").value.trim() || null,
      when_created: document.getElementById("e_whencreated").value || null,
      comments: document.getElementById("e_comments").value.trim() || null,
      last_updated_by_name: state.user.full_name,
    };
    const { error } = await sb.from("legal_cases").update(payload).eq("id", c.id);
    if (error) { toast("Could not save changes: " + error.message, true); return; }

    const changes = buildChangeDiff(c, payload);
    if (Object.keys(changes).length > 0) {
      await sb.from("case_audit_log").insert({
        case_id: c.id,
        changed_by: state.user.id,
        changed_by_name: state.user.full_name,
        changes,
      });
    }

    overlay.remove();
    if (parentOverlay) parentOverlay.remove();
    toast("Case updated.");
    await loadCases();
    renderDashboard();
  };
}

// ---------- staff manager (admin only) ----------
async function loadUsers() {
  const { data, error } = await sb.from("app_users").select("id,username,full_name,role,created_at").order("created_at", { ascending: true });
  if (error) { toast("Could not load staff: " + error.message, true); return []; }
  return data || [];
}

async function openStaffManager() {
  const overlay = document.createElement("div");
  overlay.className = "overlay";
  overlay.innerHTML = `
    <div class="drawer drawer-wide">
      <div class="drawer-head">
        <div><h3>Manage staff</h3><div class="acct-line">Create, edit, and remove staff accounts</div></div>
        <button class="close-x">&times;</button>
      </div>
      <div class="drawer-body">
        <div class="actions-row">
          <button class="btn btn-gold" id="addStaffBtn">+ Add staff account</button>
        </div>
        <div class="section-label">Existing accounts</div>
        <div id="staffListWrap"><p style="color:var(--muted); font-size:13px;">Loading…</p></div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector(".close-x").onclick = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.querySelector("#addStaffBtn").onclick = () => openAddStaffModal(overlay);

  await renderStaffList(overlay);
}

async function renderStaffList(overlay) {
  const users = await loadUsers();
  const wrap = overlay.querySelector("#staffListWrap");
  wrap.innerHTML = users.length === 0 ? `<p style="color:var(--muted); font-size:13px;">No accounts found.</p>` : `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Username</th><th>Full name</th><th>Role</th><th>Created</th><th></th></tr></thead>
        <tbody>
          ${users.map(u => `
            <tr>
              <td class="acct">${esc(u.username)}</td>
              <td>${esc(u.full_name)}</td>
              <td>
                <select data-id="${u.id}" class="roleSelect" ${u.username === state.user.username ? "disabled" : ""}>
                  ${["officer","manager","admin"].map(r => `<option value="${r}" ${r === u.role ? "selected" : ""}>${r}</option>`).join("")}
                </select>
              </td>
              <td>${fdate(u.created_at)}</td>
              <td style="white-space:nowrap;">
                <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
                  <button class="btn btn-ghost resetPwBtn" data-id="${u.id}" data-name="${esc(u.full_name)}" style="padding:4px 10px;font-size:12px;">Reset password</button>
                  ${u.username === state.user.username ? "" : `<button class="btn btn-danger deleteUserBtn" data-id="${u.id}" data-name="${esc(u.full_name)}" style="padding:4px 10px;font-size:12px;">Delete</button>`}
                </div>
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;

  wrap.querySelectorAll(".roleSelect").forEach(sel => {
    sel.onchange = async () => {
      const { error } = await sb.from("app_users").update({ role: sel.value }).eq("id", sel.dataset.id);
      if (error) { toast("Could not update role: " + error.message, true); return; }
      toast("Role updated.");
    };
  });

  wrap.querySelectorAll(".resetPwBtn").forEach(btn => {
    btn.onclick = () => openResetPasswordModal(btn.dataset.id, btn.dataset.name, overlay);
  });

  wrap.querySelectorAll(".deleteUserBtn").forEach(btn => {
    btn.onclick = async () => {
      if (!confirm(`Remove account for ${btn.dataset.name}? This cannot be undone.`)) return;
      const { error } = await sb.from("app_users").delete().eq("id", btn.dataset.id);
      if (error) { toast("Could not delete account: " + error.message, true); return; }
      toast("Account removed.");
      await renderStaffList(overlay);
    };
  });
}

function openAddStaffModal(parentOverlay) {
  const overlay = document.createElement("div");
  overlay.className = "overlay center";
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-head">
        <div><h3>Add staff account</h3></div>
        <button class="close-x">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field"><label>Full name *</label><input id="ns_fullname" /></div>
        <div class="field"><label>Username *</label><input id="ns_username" placeholder="e.g. jbusiku" /></div>
        <div class="field"><label>Role</label>
          <select id="ns_role">
            <option value="officer">officer</option>
            <option value="manager">manager</option>
            <option value="admin">admin</option>
          </select>
        </div>
        <div class="field"><label>Password *</label><input type="text" id="ns_password" value="Stanbic@2026" /></div>
        <div class="actions-row">
          <button class="btn btn-primary" id="createStaffBtn">Create account</button>
          <button class="btn btn-ghost" id="cancelStaffBtn">Cancel</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector(".close-x").onclick = () => overlay.remove();
  overlay.querySelector("#cancelStaffBtn").onclick = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  overlay.querySelector("#createStaffBtn").onclick = async () => {
    const full_name = document.getElementById("ns_fullname").value.trim();
    const username = document.getElementById("ns_username").value.trim();
    const role = document.getElementById("ns_role").value;
    const password = document.getElementById("ns_password").value;
    if (!full_name || !username || !password) { toast("Full name, username and password are required.", true); return; }

    const password_hash = await sha256Hex(password);
    const { error } = await sb.from("app_users").insert({ username, password_hash, full_name, role });
    if (error) { toast("Could not create account: " + error.message, true); return; }
    overlay.remove();
    toast("Account created.");
    await renderStaffList(parentOverlay);
  };
}

function openResetPasswordModal(userId, userName, parentOverlay) {
  const overlay = document.createElement("div");
  overlay.className = "overlay center";
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-head">
        <div><h3>Reset password</h3><div class="acct-line">${esc(userName)}</div></div>
        <button class="close-x">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field"><label>New password *</label><input type="text" id="rp_password" value="Stanbic@2026" /></div>
        <div class="actions-row">
          <button class="btn btn-primary" id="confirmResetBtn">Set password</button>
          <button class="btn btn-ghost" id="cancelResetBtn">Cancel</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector(".close-x").onclick = () => overlay.remove();
  overlay.querySelector("#cancelResetBtn").onclick = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  overlay.querySelector("#confirmResetBtn").onclick = async () => {
    const password = document.getElementById("rp_password").value;
    if (!password) { toast("Enter a new password.", true); return; }
    const password_hash = await sha256Hex(password);
    const { error } = await sb.from("app_users").update({ password_hash }).eq("id", userId);
    if (error) { toast("Could not reset password: " + error.message, true); return; }
    overlay.remove();
    toast("Password reset.");
    await renderStaffList(parentOverlay);
  };
}

init();

</script>
</body>
</html>
